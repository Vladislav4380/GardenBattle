<section class="dashboard-cards" aria-label="Турнир и награды">
  <article class="dashboard-card tournament-card">
    <header class="card-title">
      <span class="icon-placeholder trophy-icon" aria-hidden="true"></span>
      <span>ТУРНИР НЕДЕЛИ</span>
    </header>

    <div class="league-row">
      <div class="league-badge" aria-hidden="true">
        <span class="leaf-placeholder"></span>
      </div>

      <div class="league-info">
        <strong>Бронзовая лига I</strong>
        <span>Ваше место: 1253</span>
        <span>Участников: 1523</span>
      </div>
    </div>

    <button class="game-button tournament-button" type="button">К ТУРНИРУ</button>
  </article>

  <article class="dashboard-card rewards-card">
    <header class="card-title">
      <span class="icon-placeholder gift-icon" aria-hidden="true"></span>
      <span>НАГРАДЫ</span>
    </header>

    <div class="rewards-panel">
      <div class="reward-caption">Ежедневная награда</div>

      <div class="reward-list">
        <div class="reward-item">
          <span class="reward-icon coin-reward" aria-hidden="true"></span>
          <span>500</span>
        </div>

        <div class="reward-item">
          <span class="reward-icon gem-reward" aria-hidden="true"></span>
          <span>10</span>
        </div>

        <div class="reward-item">
          <span class="reward-icon card-reward" aria-hidden="true"></span>
          <span>1</span>
        </div>
      </div>

      <button class="game-button claim-button" type="button">ПОЛУЧИТЬ</button>

      <div class="chest-bottom">
        <div class="chest-progress">
          <div class="chest-label">Следующий сундук</div>

          <div class="progress-row">
            <div class="progress-bar" aria-label="Прогресс сундука 2 из 10">
              <span class="progress-fill"></span>
              <span class="progress-value">2/10</span>
            </div>
          </div>
        </div>

        <div class="chest-image" aria-hidden="true"></div>
      </div>
    </div>
  </article>
</section>
