<section class="dashboard-cards" aria-label="Турнир и награды">
  <gb-dashboard-tournament-card
    [leagueName]="tournamentCard.leagueName"
    [playerPlace]="tournamentCard.playerPlace"
    [participantsCount]="tournamentCard.participantsCount"
  ></gb-dashboard-tournament-card>

  <gb-dashboard-rewards-card
    [coins]="rewardsCard.coins"
    [gems]="rewardsCard.gems"
    [cards]="rewardsCard.cards"
    [chestProgressCurrent]="rewardsCard.chestProgressCurrent"
    [chestProgressTarget]="rewardsCard.chestProgressTarget"
    [chestProgressValue]="rewardsCard.chestProgressValue"
  ></gb-dashboard-rewards-card>
</section>
