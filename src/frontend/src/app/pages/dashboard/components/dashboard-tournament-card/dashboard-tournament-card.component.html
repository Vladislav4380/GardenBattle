<article class="dashboard-card tournament-card">
  <header class="card-title">
    <img class="title-icon trophy-icon" src="assets/shared/hud/hud-trophy.png" alt="" />
    <span>ТУРНИР НЕДЕЛИ</span>
  </header>

  <div class="league-row">
    <img class="league-icon" src="assets/shared/hud/hud_sword.png" alt="" aria-hidden="true" />

    <div class="league-info">
      <strong>{{ leagueName }}</strong>
      <span>Ваше место: {{ playerPlace }}</span>
      <span>Участников: {{ participantsCount }}</span>
    </div>
  </div>

  <button class="game-button tournament-button" type="button">К ТУРНИРУ</button>
</article>
