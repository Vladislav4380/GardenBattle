<ion-content fullscreen class="dashboard-page">
  <div class="dashboard-viewport" [style.--dashboard-scale]="dashboardScale">
    <main class="dashboard-shell">
      @if (dashboardData.header$ | async; as header) {
        <gb-dashboard-header
          [playerName]="header.playerName"
          [coins]="header.coins"
          [gems]="header.gems"
          [xpCurrent]="header.xpCurrent"
          [xpTarget]="header.xpTarget"
        ></gb-dashboard-header>
      }

      <section class="dashboard-content" aria-label="Основные блоки страницы">
        @if (dashboardData.gardenCard$ | async; as gardenCard) {
          <gb-dashboard-garden-card
            [title]="gardenCard.title"
            [iconSrc]="gardenCard.iconSrc"
            [summaryText]="gardenCard.summaryText"
            [plots]="gardenCard.plots"
          ></gb-dashboard-garden-card>
        }

        @if (dashboardData.teamCard$ | async; as teamCard) {
          <gb-dashboard-team-card
            [title]="teamCard.title"
            [iconSrc]="teamCard.iconSrc"
            [summaryText]="teamCard.summaryText"
            [members]="teamCard.members"
          ></gb-dashboard-team-card>
        }

        @if (dashboardData.tournamentCard$ | async; as tournamentCard) {
          @if (dashboardData.rewardsCard$ | async; as rewardsCard) {
            <gb-dashboard-cards
              [tournamentCard]="tournamentCard"
              [rewardsCard]="rewardsCard"
            ></gb-dashboard-cards>
          }
        }

        <gb-dashboard-nav-panel></gb-dashboard-nav-panel>
      </section>
    </main>
  </div>
</ion-content>
