<ion-content fullscreen class="garden-page">
  <main
    class="garden-shell"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp()"
    (pointercancel)="onPointerUp()"
    (wheel)="onWheel($event)"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="onTouchEnd($event)"
  >
    <div
      class="map-canvas"
      [style.width.px]="mapWidth"
      [style.height.px]="mapHeight"
      [style.left.px]="mapLeft"
      [style.top.px]="mapTop"
      [style.transform]="mapTransform"
    >
      <img class="full-map" src="/assets/garden/terrain/fullHd.png" alt="" draggable="false" aria-hidden="true" />

      @for (object of mapObjects; track object.id) {
        <button
          class="map-object"
          type="button"
          [class.is-ghost]="object.isGhost"
          [class.is-invalid]="isInvalidObject(object)"
          [ngStyle]="objectStyle(object)"
          (dblclick)="onObjectDoubleClick($event, object)"
          (pointerdown)="onObjectPointerDown($event, object)"
          (pointerup)="onObjectPointerUp($event, object)"
          (wheel)="onObjectWheel($event)"
        >
          <img [src]="object.image" [alt]="object.label" draggable="false" />
        </button>
      }

      @for (object of mapObjects; track object.id + '-growth') {
        @if (object.type === 'bed' && !object.isGhost && isGrowing(object)) {
          <span class="growth-indicator" [ngStyle]="growthIndicatorStyle(object)">
            <span class="growth-indicator__label">{{ growthLabel(object) }}</span>
            <span class="growth-indicator__track">
              <span class="growth-indicator__bar" [style.width.%]="growthProgress(object)"></span>
            </span>
          </span>
        }
      }
    </div>

    @if (dashboardData.header$ | async; as header) {
      <gb-dashboard-header
        [playerName]="header.playerName"
        [coins]="header.coins"
        [gems]="header.gems"
        [xpCurrent]="header.xpCurrent"
        [xpTarget]="header.xpTarget"
      ></gb-dashboard-header>
    }

    <gb-dashboard-nav-panel></gb-dashboard-nav-panel>
  </main>
</ion-content>
