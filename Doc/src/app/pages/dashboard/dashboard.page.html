<ion-content fullscreen class="dashboard-page">
  <div class="dashboard-bg"></div>

  <main class="dashboard-shell">
    <app-header-profile
      [player]="player"
      (shopClick)="openShop()">
    </app-header-profile>

    <app-garden-panel
      [plots]="gardenPlots"
      (harvestClick)="harvest()">
    </app-garden-panel>

    <app-team-panel
      [fighters]="team"
      [teamPower]="teamPower"
      (battleClick)="startBattle()">
    </app-team-panel>

    <section class="dashboard-bottom-grid">
      <app-tournament-card
        [tournament]="tournament"
        (openTournamentClick)="openTournament()">
      </app-tournament-card>

      <app-rewards-card
        [reward]="reward"
        (claimClick)="claimReward()">
      </app-rewards-card>
    </section>
  </main>

  <app-bottom-navigation
    [items]="navigation"
    (tabClick)="navigateTab($event)">
  </app-bottom-navigation>
</ion-content>
