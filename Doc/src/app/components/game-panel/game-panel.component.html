<section class="game-panel" [class.purple]="variant === 'purple'">
  <header class="game-panel-header" *ngIf="title">
    <div class="game-panel-title">
      <span class="game-panel-icon" *ngIf="icon">{{ icon }}</span>
      <span>{{ title }}</span>
    </div>

    <div class="game-panel-right" *ngIf="rightText">
      {{ rightText }}
    </div>
  </header>

  <div class="game-panel-body">
    <ng-content></ng-content>
  </div>
</section>
