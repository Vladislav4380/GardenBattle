<header class="header-profile">
  <div class="avatar-wrap">
    <img class="avatar-img" [src]="player.avatarImage" [alt]="player.name" />
    <div class="avatar-level">{{ player.level }}</div>
  </div>

  <div class="profile-center">
    <h1>{{ player.name }}</h1>

    <div class="xp-row">
      <div class="level-star">{{ player.level }}</div>

      <div class="xp-bar">
        <div class="xp-fill" [style.width.%]="expPercent"></div>
        <span>{{ player.exp }}/{{ player.nextLevelExp }}</span>
      </div>
    </div>
  </div>

  <div class="currency-row">
    <div class="currency-pill">
      <span class="currency-icon coin">★</span>
      <strong>{{ player.coins }}</strong>
      <span class="plus">+</span>
    </div>

    <div class="currency-pill">
      <span class="currency-icon gem">◆</span>
      <strong>{{ player.gems }}</strong>
      <span class="plus">+</span>
    </div>

    <button type="button" class="shop-button" (click)="shopClick.emit()">
      🛒
    </button>
  </div>
</header>
