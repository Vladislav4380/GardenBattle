<article class="plot-card" [class.locked]="plot.status === 'locked'">
  <div class="plot-image-wrap">
    <img *ngIf="plot.status !== 'locked'" [src]="plot.image" [alt]="plot.name" />

    <div class="lock-state" *ngIf="plot.status === 'locked'">
      <div class="lock">🔒</div>
      <p>Откроется<br />на {{ plot.unlockLevel }} уровне</p>
    </div>
  </div>

  <div class="plot-state ready" *ngIf="plot.status === 'ready'">
    <span>Готово!</span>
    <b>✓</b>
  </div>

  <div class="plot-state growing" *ngIf="plot.status === 'growing'">
    <span>{{ plot.remainingText }}</span>
    <b>⏱</b>
  </div>
</article>
